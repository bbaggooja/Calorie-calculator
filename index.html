<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>한끼 칼로리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;--accent:#FF6B35;--accent2:#FF9F1C;--green:#2EC4B6;--text:#f0f0f0;--text2:#888;--radius:16px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .app{max-width:480px;margin:0 auto;padding:20px 16px 100px}
  .header{text-align:center;padding:24px 0 16px}
  .header h1{font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header p{color:var(--text2);font-size:12px;margin-top:4px}
  .tabs{display:flex;gap:4px;background:var(--surface);border-radius:12px;padding:4px;margin-bottom:16px}
  .tab{flex:1;padding:10px;border:none;border-radius:10px;background:transparent;color:var(--text2);font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s}
  .tab.active{background:var(--accent);color:#fff}
  .panel{display:none}.panel.active{display:block}
  .search-wrap{position:relative;margin-bottom:12px}
  .search-input{width:100%;padding:14px 44px 14px 16px;border:1px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none}
  .search-input:focus{border-color:var(--accent)}
  .search-input::placeholder{color:#555}
  .search-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:36px;height:36px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:16px;cursor:pointer}
  .food-results{max-height:320px;overflow-y:auto;margin-bottom:16px}
  .food-result-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:all .15s}
  .food-result-item:active{background:var(--surface2);transform:scale(.98)}
  .food-result-name{font-size:14px;font-weight:600}
  .food-result-info{font-size:11px;color:var(--text2);margin-top:2px}
  .food-result-kcal{font-family:'JetBrains Mono',monospace;color:var(--accent2);font-weight:700}
  .tray{margin-bottom:16px}.tray-title{font-size:13px;color:var(--text2);margin-bottom:8px;font-weight:600}
  .tray-item{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:4px}
  .tray-item-name{font-size:13px}
  .tray-item-right{display:flex;align-items:center;gap:8px}
  .tray-item-kcal{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent2);font-weight:700}
  .tray-remove{width:24px;height:24px;border:none;border-radius:50%;background:rgba(239,68,68,.15);color:#ef4444;font-size:14px;cursor:pointer}
  .tray-empty{font-size:12px;color:#555;text-align:center;padding:16px}
  .upload-zone{background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);padding:32px 20px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden}
  .upload-zone.has-image{padding:0;border-style:solid;border-color:var(--border)}
  .upload-icon{font-size:40px;margin-bottom:8px;display:block}
  .upload-text{font-size:14px;font-weight:600}.upload-hint{font-size:11px;color:var(--text2);margin-top:4px}
  .preview-img{width:100%;max-height:260px;object-fit:cover;display:block;border-radius:14px}
  .remove-btn{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .upload-buttons{display:flex;gap:8px;margin-bottom:12px}
  .upload-btn{flex:1;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .upload-btn:active{transform:scale(.97);background:var(--surface2)}
  .upload-buttons.hidden{display:none}
  .analyze-btn{width:100%;padding:14px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:16px}
  .analyze-btn:disabled{opacity:.4;cursor:not-allowed}
  .loading{display:none;text-align:center;padding:30px 20px}.loading.active{display:block}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{color:var(--text2);font-size:13px}
  .error{display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:14px;margin-bottom:14px;color:#ef4444;font-size:13px;white-space:pre-wrap;word-break:break-all}
  .error.active{display:block}
  .total-card{background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
  .total-card::before{content:'';position:absolute;top:-50%;right:-30%;width:180px;height:180px;background:rgba(255,255,255,.08);border-radius:50%}
  .total-label{font-size:12px;opacity:.9;text-transform:uppercase;letter-spacing:2px}
  .total-kcal{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;line-height:1;margin:6px 0 2px}
  .total-unit{font-size:13px;opacity:.8}
  .macros{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .macro-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center}
  .macro-label{font-size:10px;color:var(--text2);margin-bottom:4px}
  .macro-value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
  .macro-unit{font-size:10px;color:var(--text2)}
  .macro-card.carb .macro-value{color:var(--accent2)}
  .macro-card.protein .macro-value{color:var(--green)}
  .macro-card.fat .macro-value{color:#E879F9}
  .food-list{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .food-list-header{padding:12px 14px;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:1px}
  .food-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border)}
  .food-item:last-child{border-bottom:none}
  .food-name{font-size:13px}.food-portion{font-size:10px;color:var(--text2);margin-top:1px}
  .food-kcal{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--accent2);white-space:nowrap}
  .disclaimer{margin-top:14px;padding:10px 12px;background:var(--surface2);border-radius:8px;font-size:10px;color:var(--text2);line-height:1.5}
  .results{display:none;animation:fadeUp .4s ease}.results.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .history-section{margin-top:28px}.history-title{font-size:15px;font-weight:700;margin-bottom:10px}
  .history-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
  .history-time{font-size:10px;color:var(--text2)}.history-foods{font-size:12px;margin-top:1px}
  .history-kcal{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--accent)}
  .daily-total{background:var(--surface2);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .daily-total-label{font-size:13px;font-weight:600}
  .daily-total-value{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--green)}
  .settings{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px}
  .settings summary{font-size:12px;font-weight:600;cursor:pointer;color:var(--accent2)}
  .settings-content{margin-top:10px}
  .settings-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .settings-label{font-size:12px;color:var(--text2);min-width:80px}
  .settings-input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none}
  .settings-input:focus{border-color:var(--accent)}
  .settings-save{padding:8px 16px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-size:12px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px}
  .settings-status{font-size:11px;color:var(--green);margin-top:6px;display:none}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🍽️ 한끼 칼로리</h1>
    <p>AI 사진인식 + 영양DB로 정확한 칼로리 계산</p>
  </div>

  <details class="settings" id="settingsPanel">
    <summary>⚙️ API 설정 (Gemini 키만 필수)</summary>
    <div class="settings-content">
      <div class="settings-row">
        <span class="settings-label">Gemini 키</span>
        <input type="password" class="settings-input" id="geminiKeyInput" placeholder="AIza...">
      </div>
      <button class="settings-save" id="settingsSaveBtn">저장</button>
      <div class="settings-status" id="settingsStatus">✅ 저장 완료</div>
    </div>
  </details>

  <div class="tabs">
    <button class="tab active" data-tab="photo">📷 사진 분석</button>
    <button class="tab" data-tab="search">🔍 음식 검색</button>
  </div>

  <div class="panel active" id="panel-photo">
    <div class="upload-zone" id="uploadZone">
      <span class="upload-icon">📸</span>
      <div class="upload-text">음식 사진을 올려주세요</div>
      <div class="upload-hint">카메라 촬영 또는 갤러리에서 선택</div>
    </div>
    <div class="upload-buttons" id="uploadButtons">
      <button type="button" class="upload-btn" id="cameraBtn">📷 카메라</button>
      <button type="button" class="upload-btn" id="galleryBtn">🖼️ 갤러리</button>
    </div>
    <input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none">
    <input type="file" accept="image/*" id="galleryInput" style="display:none">
    <button class="analyze-btn" id="photoAnalyzeBtn" disabled>🔍 AI 분석하기</button>
  </div>

  <div class="panel" id="panel-search">
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="음식 이름 (예: 된장찌개, 김밥, 삼겹살)">
      <button class="search-btn" id="searchBtn">🔍</button>
    </div>
    <div class="food-results" id="foodResults"></div>
    <div class="tray" id="tray">
      <div class="tray-title">🛒 선택한 음식</div>
      <div id="trayList"><div class="tray-empty">음식을 검색해서 추가하세요</div></div>
    </div>
    <button class="analyze-btn" id="searchCalcBtn" disabled>📊 칼로리 합산</button>
  </div>

  <div class="error" id="errorMsg"></div>
  <div class="loading" id="loading"><div class="spinner"></div><div class="loading-text" id="loadingText">분석 중...</div></div>

  <div class="results" id="results">
    <div class="total-card">
      <div class="total-label">이번 한끼 총 칼로리</div>
      <div class="total-kcal" id="totalKcal">0</div>
      <div class="total-unit">kcal</div>
    </div>
    <div class="macros">
      <div class="macro-card carb"><div class="macro-label">탄수화물</div><div class="macro-value" id="carbVal">0</div><div class="macro-unit">g</div></div>
      <div class="macro-card protein"><div class="macro-label">단백질</div><div class="macro-value" id="proteinVal">0</div><div class="macro-unit">g</div></div>
      <div class="macro-card fat"><div class="macro-label">지방</div><div class="macro-value" id="fatVal">0</div><div class="macro-unit">g</div></div>
    </div>
    <div class="food-list" id="foodList"><div class="food-list-header">🍜 분석 결과</div></div>
    <div class="disclaimer">⚠️ AI 추정값 기반이며 조리법/양에 따라 차이가 있을 수 있습니다.</div>
  </div>

  <div class="history-section" id="historySection" style="display:none">
    <div class="history-title">📊 오늘 기록</div>
    <div id="historyList"></div>
    <div class="daily-total">
      <span class="daily-total-label">오늘 총 섭취</span>
      <span class="daily-total-value" id="dailyTotal">0 kcal</span>
    </div>
  </div>
</div>

// --- 이미지 ---
$('cameraBtn').addEventListener('click',()=>{$('cameraInput').value='';$('cameraInput').click()});

function handleImage(file){
  if(file.size>10*1024*1024)return showError('이미지 10MB 초과');
  const reader=new FileReader();
  reader.onload=e=>{
    currentImageBase64=e.target.result.split(',')[1];
    currentMediaType=file.type||'image/jpeg';
    $('uploadZone').classList.add('has-image');
    $('uploadZone').innerHTML=`<img class="preview-img" src="${e.target.result}"><button class="remove-btn" onclick="resetUpload(event)">✕</button>`;
    $('uploadButtons').classList.add('hidden');
    $('photoAnalyzeBtn').disabled=false;
    $('results').classList.remove('active');
    $('errorMsg').classList.remove('active');
  };
  reader.readAsDataURL(file);
}

function resetUpload(e){
  if(e)e.stopPropagation();
  currentImageBase64=null;
  $('uploadZone').classList.remove('has-image');
  $('uploadZone').innerHTML='<span class="upload-icon">📸</span><div class="upload-text">음식 사진을 올려주세요</div><div class="upload-hint">카메라 촬영 또는 갤러리에서 선택</div>';
  $('uploadButtons').classList.remove('hidden');
  $('photoAnalyzeBtn').disabled=true;
  $('results').classList.remove('active');
}

function showError(msg){$('errorMsg').textContent='❌ '+msg;$('errorMsg').classList.add('active')}
function setLoading(on,msg){$('loading').classList.toggle('active',on);if(msg)$('loadingText').textContent=msg}

// --- 내장 DB 검색 (퍼지 매칭) ---
function searchLocalDB(query){
  const q=query.trim().toLowerCase();
  if(!q)return[];
  return FOOD_DB.filter(f=>f.name.toLowerCase().includes(q)||q.includes(f.name.toLowerCase()));
}

// --- Gemini 호출 (단순화) ---
async function callGemini(base64, mimeType, prompt) {
  var myKey = geminiKey;
  var models = ['gemini-2.0-flash', 'gemini-2.5-flash'];
  var logs = [];

  for (var i = 0; i < models.length; i++) {
    var model = models[i];
    try {
      var apiUrl = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + myKey;

      const response = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: mimeType, data: base64 } },
              { text: prompt }
            ]
          }]
        })
      });

      const json = await response.json();
      logs.push('[' + model + '] status=' + response.status + ' err=' + (json.error ? json.error.message.substring(0, 60) : 'none'));

      if (json.error) continue;
      return json;
    } catch (e) {
      logs.push('[' + model + '] catch: ' + e.message.substring(0, 60));
      continue;
    }
  }

  throw new Error('AI 분석 실패\n\n' + logs.join('\n'));
}

// --- 사진 분석 ---
$('photoAnalyzeBtn').addEventListener('click',async()=>{
  if(!currentImageBase64)return;
  if(!geminiKey)return showError('Gemini API 키를 설정해주세요.');

  setLoading(true,'AI가 음식을 인식하고 있어요...');
  $('results').classList.remove('active');
  $('errorMsg').classList.remove('active');
  $('photoAnalyzeBtn').disabled=true;

  try{
    const prompt=`이 음식 사진을 분석해서 각 음식의 이름, 추정 칼로리, 영양소를 알려주세요.

반드시 아래 JSON 형식으로만 답변하세요. 다른 텍스트 없이 JSON만 출력하세요.

{
  "total_kcal": 숫자,
  "carb_g": 숫자,
  "protein_g": 숫자,
  "fat_g": 숫자,
  "foods": [
    {"name":"음식이름(한국어)","portion":"추정량","kcal":숫자,"carb":숫자,"protein":숫자,"fat":숫자}
  ]
}

- 모든 음식 개별 분류 (밥, 반찬, 국, 소스, 음료 포함)
- 한국어 이름, 1인분 기준
- 칼로리와 3대 영양소(탄수화물,단백질,지방) 반드시 포함`;

    const data=await callGemini(currentImageBase64,currentMediaType,prompt);
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const cleaned=text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const jsonMatch=cleaned.match(/\{[\s\S]*\}/);
    if(!jsonMatch)throw new Error('분석 결과를 파싱할 수 없습니다.');

    const result=JSON.parse(jsonMatch[0]);
    if(!result.total_kcal||!result.foods)throw new Error('음식을 인식하지 못했습니다.');

    // 내장 DB에서 매칭 시도하여 보정
    result.foods.forEach(f=>{
      const match=searchLocalDB(f.name);
      if(match.length>0){
        f.kcal=match[0].kcal;
        f.carb=match[0].carb;
        f.protein=match[0].protein;
        f.fat=match[0].fat;
        f.portion=match[0].serving;
        f.source='DB매칭';
      }else{
        f.source='AI추정';
      }
    });

    // 합계 재계산
    let tk=0,tc=0,tp=0,tf=0;
    result.foods.forEach(f=>{tk+=f.kcal;tc+=f.carb;tp+=f.protein;tf+=f.fat});
    result.total_kcal=Math.round(tk);
    result.carb_g=Math.round(tc);
    result.protein_g=Math.round(tp);
    result.fat_g=Math.round(tf);

    displayResults(result);
  }catch(err){
    showError(err.message);
  }finally{
    setLoading(false);
    $('photoAnalyzeBtn').disabled=false;
  }
});

// --- 음식 검색 (내장 DB) ---
function doSearch(){
  const q=$('searchInput').value.trim();
  if(!q)return;
  $('errorMsg').classList.remove('active');

  const results=searchLocalDB(q);
  if(!results.length){
    $('foodResults').innerHTML='<div style="text-align:center;padding:16px;color:#888;font-size:13px;">결과 없음. 다른 이름으로 검색해보세요.<br><span style="font-size:11px;">예) 김치찌개, 비빔밥, 삼겹살, 라면</span></div>';
    return;
  }
  $('foodResults').innerHTML=results.map((r,i)=>`
    <div class="food-result-item" onclick="addToTray(${i})" data-idx="${i}">
      <div class="food-result-name">${r.name}</div>
      <div class="food-result-info">${r.serving} · <span class="food-result-kcal">${r.kcal} kcal</span> · 탄${r.carb}g 단${r.protein}g 지${r.fat}g</div>
    </div>
  `).join('');
  window._lastSearchResults=results;
}

$('searchBtn').addEventListener('click',doSearch);
$('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});

function addToTray(idx){
  const food=window._lastSearchResults[idx];
  if(!food)return;
  selectedFoods.push({...food});
  renderTray();
}

function removeFromTray(idx){
  selectedFoods.splice(idx,1);
  renderTray();
}

function renderTray(){
  const list=$('trayList');
  if(!selectedFoods.length){
    list.innerHTML='<div class="tray-empty">음식을 검색해서 추가하세요</div>';
    $('searchCalcBtn').disabled=true;
    return;
  }
  list.innerHTML=selectedFoods.map((f,i)=>`
    <div class="tray-item">
      <span class="tray-item-name">${f.name} (${f.serving})</span>
      <div class="tray-item-right">
        <span class="tray-item-kcal">${f.kcal} kcal</span>
        <button class="tray-remove" onclick="removeFromTray(${i})">✕</button>
      </div>
    </div>
  `).join('');
  $('searchCalcBtn').disabled=false;
}

$('searchCalcBtn').addEventListener('click',()=>{
  if(!selectedFoods.length)return;
  let tk=0,tc=0,tp=0,tf=0;
  const foods=selectedFoods.map(f=>{
    tk+=f.kcal;tc+=f.carb;tp+=f.protein;tf+=f.fat;
    return{name:f.name,portion:f.serving,kcal:f.kcal,carb:f.carb,protein:f.protein,fat:f.fat,source:'DB매칭'};
  });
  displayResults({total_kcal:Math.round(tk),carb_g:Math.round(tc),protein_g:Math.round(tp),fat_g:Math.round(tf),foods});
  selectedFoods=[];
  renderTray();
});

// --- 결과 표시 ---
function displayResults(data){
  $('totalKcal').textContent=data.total_kcal.toLocaleString();
  $('carbVal').textContent=data.carb_g;
  $('proteinVal').textContent=data.protein_g;
  $('fatVal').textContent=data.fat_g;
  const fl=$('foodList');
  fl.innerHTML='<div class="food-list-header">🍜 분석 결과</div>';
  data.foods.forEach(f=>{
    const badge=f.source==='DB매칭'?'✅':'🤖';
    const d=document.createElement('div');d.className='food-item';
    d.innerHTML=`<div><div class="food-name">${badge} ${f.name}</div><div class="food-portion">${f.portion} · ${f.source}</div></div><div class="food-kcal">${f.kcal} kcal</div>`;
    fl.appendChild(d);
  });
  $('results').classList.add('active');
  const now=new Date();
  todayMeals.push({time:now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),foods:data.foods.map(f=>f.name).join(', '),kcal:data.total_kcal});
  updateHistory();
}

function updateHistory(){
  if(!todayMeals.length)return;
  $('historySection').style.display='block';
  const list=$('historyList');list.innerHTML='';
  let sum=0;
  todayMeals.forEach(m=>{
    sum+=m.kcal;
    const d=document.createElement('div');d.className='history-item';
    d.innerHTML=`<div><div class="history-time">${m.time}</div><div class="history-foods">${m.foods}</div></div><div class="history-kcal">${m.kcal.toLocaleString()}</div>`;
    list.appendChild(d);
  });
  $('dailyTotal').textContent=sum.toLocaleString()+' kcal';
}
